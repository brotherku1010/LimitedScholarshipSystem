<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古哥獎學金審查系統</title>
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- FontAwesome & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --neon-blue: #00bbf9;
            --neon-blue-glow: rgba(0, 187, 249, 0.3);
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            color: #fff;
        }

        /* Responsive Iframe Container */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* The position: absolute style will be overwritten dynamically by JS based on platform detection! */
        .iframe-container iframe {
            position: absolute;
            top: -42px; /* Default desktop offset */
            left: 0;
            width: 100%;
            height: calc(100% + 42px);
            border: none;
        }

        /* Beautiful Loading Screen */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            text-align: center;
        }

        .loading-card {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 187, 249, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
            filter: drop-shadow(0 0 8px var(--neon-blue-glow));
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Loading screen during LIFF login verification -->
    <div class="loading-container" id="loading-screen">
        <div class="loading-card">
            <div class="spinner"></div>
            <h1>LINE 身分驗證中</h1>
            <p>正在透過 LINE 安全加密通道驗證您的學籍身分，請稍候...</p>
        </div>
    </div>

    <!-- The cropped iframe to hide Google apps script warning header -->
    <div class="iframe-container" id="app-container" style="display: none;">
        <iframe id="gas-frame" src="" allow="camera; microphone; geolocation;"></iframe>
    </div>

    <script>
        // LIFF Config
        const LIFF_ID = "2010560500-s1V0QyLa";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyFaYuaKf_P816lNT2xwmqN2N6fuzILWjr9n1JwtziFygk54Ktx5Sd_jAfCwSzQ4pAW/exec";

        // 1. Client-side Platform Detection & Branching
        const ua = navigator.userAgent.toLowerCase();
        const isIOS = /ipad|iphone|ipod/.test(ua) && !window.MSStream;
        const isAndroid = /android/.test(ua);
        
        let platform = "desktop";
        if (isIOS) platform = "ios";
        else if (isAndroid) platform = "android";

        // 2. Set dynamic offsets to cut Google banner precisely without cutting our web app top header
        const iframe = document.getElementById('gas-frame');
        if (platform === "ios") {
            // iOS WKWebView Banner Offset
            iframe.style.top = "-42px";
            iframe.style.height = "calc(100% + 42px)";
        } else if (platform === "android") {
            // Android System WebView Banner Offset
            iframe.style.top = "-42px";
            iframe.style.height = "calc(100% + 42px)";
        } else {
            // Desktop Browser Banner Offset (reduced from -46px to avoid cutting top border)
            iframe.style.top = "-42px";
            iframe.style.height = "calc(100% + 42px)";
        }

        async function initializeLiff() {
            try {
                // Initialize LIFF
                await liff.init({ liffId: LIFF_ID });
                
                // If not logged in, trigger LINE Login natively (runs at top-level window!)
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // Logged in successfully, retrieve student profile
                    const profile = await liff.getProfile();
                    const uid = profile.userId;
                    const name = profile.displayName || "";
                    
                    // Forward parameters including platform to GAS
                    const targetParams = new URLSearchParams(window.location.search);
                    targetParams.set("lineUid", uid);
                    targetParams.set("lineDisplayName", name);
                    targetParams.set("platform", platform); // Pass platform branch to GAS server!
                    
                    const finalUrl = `${GAS_URL}?${targetParams.toString()}`;
                    
                    // Inject URL to iframe and show system
                    iframe.src = finalUrl;
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                }
            } catch (err) {
                console.error("LIFF initialization failed", err);
                document.getElementById('loading-screen').innerHTML = `
                    <div class="loading-card" style="border-color: #ef4444;">
                        <i class="fa-solid fa-circle-xmark" style="font-size: 3rem; color: #ef4444; margin-bottom: 15px;"></i>
                        <h1 style="color: #ef4444;">驗證失敗</h1>
                        <p style="margin-bottom: 15px;">無法與 LINE 伺服器取得連線。</p>
                        <button onclick="window.location.reload();" style="background: var(--neon-blue); border: none; color: #0f172a; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer;">重新整理</button>
                    </div>
                `;
            }
        }

        initializeLiff();
    </script>
</body>
</html>
